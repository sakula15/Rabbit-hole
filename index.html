<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Rabbit Hole</title>
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#faf7f4">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page active" id="page-chat">

<div class="topbar">
  <button class="icon-btn" id="btnConvs">☰</button>
  <h1 id="convTitle">对话<span class="ctx-badge" id="ctxBadge"></span></h1>
  <button class="icon-btn" id="btnToolbar">🔍</button>
  <button class="icon-btn" id="btnSettings">⚙️</button>
</div>

<div class="chat" id="chat"></div>

<div class="member-bar" id="memberBar"></div>
<div class="attach-bar" id="attachBar"></div>

<div class="inputbar">
  <div class="sticker-popup" id="stickerPopup">
    <div class="sticker-grid" id="stickerGrid"></div>
  </div>
  <button class="attach-btn" id="btnAttach">📎</button>
  <button class="attach-btn" id="btnSticker">😺</button>
  <input type="file" id="fileInput" multiple accept="*/*" style="display:none">
  <textarea id="input" rows="1" placeholder="说点什么…"></textarea>
  <button class="send-btn" id="btnSend">➤</button>
</div>

</div><!-- page-chat结束 -->

<div class="page" id="page-roles">
  <div class="topbar"><h1>🎭 角色管理</h1></div>
  <div class="char-list" id="charList"></div>
  <div class="char-add-bar">
    <button class="btn-new-conv" id="btnNewChar">＋ 新建角色</button>
    <button class="btn-clear" id="btnImportChar" style="font-size:12px;margin-left:8px;">📥 导入tavo卡</button>
    <input type="file" id="charImportFile" accept=".json" style="display:none">
  </div>
  <!-- 角色编辑弹窗 -->
  <div class="mask" id="maskChar"></div>
  <div class="char-editor" id="charEditor">
    <h2 id="charEditorTitle">新建角色</h2>
    <div class="field">
      <label>角色名称</label>
      <input type="text" id="charName" placeholder="给角色起个名字">
    </div>
    <div class="field">
      <label>头像（emoji）</label>
      <input type="text" id="charAvatar" placeholder="🎭" maxlength="4">
    </div>
    <div class="field">
      <label>角色人设</label>
      <textarea id="charSystem" rows="12" placeholder="写角色的人设、性格、背景…"></textarea>
    </div>
    <div class="field"><label>开场白（可选，多条可选一条开始对话）</label>
      <div id="charGreetings"></div>
      <button class="btn-clear" id="btnAddGreeting" type="button" style="margin-top:6px;font-size:12px;">＋ 添加一条开场白</button>
    </div>
    <div class="panel-btns">
      <button class="btn-danger" id="btnCharDel" style="display:none;">删除</button>
      <button class="btn-clear" id="btnCharCancel">取消</button>
      <button class="btn-save" id="btnCharSave">保存</button>
    </div>
  </div>
</div>
<div class="page" id="page-rp">
  <div class="topbar"><h1>💬 角色聊天</h1></div>
  <div class="rp-list" id="rpList"></div>
  <div class="char-add-bar">
    <button class="btn-new-conv" id="btnNewRp">＋ 新建对话</button>
  </div>
  <!-- 新建对话弹窗 -->
  <div class="mask" id="maskNewRp"></div>
  <div class="char-editor" id="newRpPanel">
    <h2>新建角色对话</h2>
    <div class="field"><label>选择角色</label>
      <select id="rpSelChar" style="width:100%;padding:8px;border:1px solid var(--line);border-radius:10px;font-size:13px;background:var(--bg);"></select>
    </div>
    <div class="field"><label>选择用户人设（可跳过）</label>
      <select id="rpSelPersona" style="width:100%;padding:8px;border:1px solid var(--line);border-radius:10px;font-size:13px;background:var(--bg);"></select>
    </div>
    <div class="field" id="rpGreetingField" style="display:none;"><label>选择开场白（可跳过）</label>
      <select id="rpSelGreeting" style="width:100%;padding:8px;border:1px solid var(--line);border-radius:10px;font-size:13px;background:var(--bg);"></select>
    </div>
    <div class="field"><label>对话备注名</label>
      <input type="text" id="rpConvName" placeholder="给这个对话起个名字（可选）">
    </div>
    <div class="panel-btns">
      <button class="btn-clear" id="btnNewRpCancel">取消</button>
      <button class="btn-save" id="btnNewRpCreate">创建</button>
    </div>
  </div>
  <!--RP聊天窗口 -->
  <div class="rp-chat-view" id="rpChatView">
    <div class="topbar">
      <button class="icon-btn" id="rpBack">←</button>
      <h1 id="rpChatTitle">对话</h1>
      <button class="icon-btn" id="rpChatSettings">⚙️</button>
    </div>
    <div class="chat rp-messages" id="rpMessages"></div>
    <div class="inputbar">
      <button class="attach-btn" id="rpBtnAttach">📎</button>
      <input type="file" id="rpFileInput" multiple accept="*/*" style="display:none">
      <textarea id="rpInput" rows="1" placeholder="说点什么…"></textarea>
      <button class="send-btn" id="rpBtnSend">➤</button>
    </div>
  </div>
  <!-- RP对话设置 -->
  <div class="mask" id="maskRpSettings"></div>
  <div class="char-editor" id="rpSettingsPanel">
    <h2>对话设置</h2>
    <div class="field"><label>渠道</label>
      <select id="rpSetChannel" style="width:100%;padding:8px;border:1px solid var(--line);border-radius:10px;font-size:13px;background:var(--bg);"></select>
    </div>
    <div class="field"><label>模型</label>
      <input type="text" id="rpSetModel" placeholder="模型名" list="rpModelList">
      <datalist id="rpModelList"></datalist>
    </div>
    <div class="field"><label>对话情景（仅此对话）</label>
      <textarea id="rpSetScenario" rows="4" placeholder="可留空，叠加在角色人设和用户人设之后"></textarea>
    </div>
    <div class="field"><label>上下文条数</label>
      <div class="slider-row">
        <input type="range" id="rpSetCtx" min="0" max="200" step="2" value="20">
        <span class="val" id="rpCtxVal">20</span>
      </div>
    </div>
    <div class="field"><label>温度 Temperature</label>
      <div class="slider-row">
        <input type="range" id="rpSetTemp" min="0" max="2" step="0.1" value="0.8">
        <span class="val" id="rpTempVal">0.8</span>
      </div>
    </div>
    <div class="field"><label>Top-P</label>
      <div class="slider-row">
        <input type="range" id="rpSetTopP" min="0" max="1" step="0.05" value="0.95">
        <span class="val" id="rpTopPVal">0.95</span>
      </div>
    </div>
    <div class="field"><label>流式输出</label>
      <div class="seg">
        <button id="rpStreamOn">开</button>
        <button id="rpStreamOff">关</button>
      </div>
    </div>
    <div class="panel-btns">
      <button class="btn-danger" id="btnRpDelConv">删除此对话</button>
      <button class="btn-save" id="btnRpSaveSettings">保存</button>
    </div>
  </div>
</div>
<div class="page" id="page-persona">
  <div class="topbar"><h1>👤 用户人设</h1></div>
  <div class="char-list" id="personaList"></div>
  <div class="char-add-bar">
    <button class="btn-new-conv" id="btnNewPersona">＋ 新建人设</button>
  </div>
  <div class="mask" id="maskPersona"></div>
  <div class="char-editor" id="personaEditor">
    <h2 id="personaEditorTitle">新建人设</h2>
    <div class="field">
      <label>角色名称（发送给AI识别）</label>
      <input type="text" id="personaName" placeholder="你在故事里叫什么">
    </div>
    <div class="field">
      <label>备注名（仅自己可见）</label>
      <input type="text" id="personaLabel" placeholder="比如「跟琉璃用的」">
    </div>
    <div class="field">
      <label>头像（emoji）</label>
      <input type="text" id="personaAvatar" placeholder="👤" maxlength="4">
    </div>
    <div class="field">
      <label>人设内容</label>
      <textarea id="personaContent" rows="12" placeholder="写你的角色背景、性格…"></textarea>
    </div>
    <div class="panel-btns">
      <button class="btn-danger" id="btnPersonaDel" style="display:none;">删除</button>
      <button class="btn-clear" id="btnPersonaCancel">取消</button>
      <button class="btn-save" id="btnPersonaSave">保存</button>
    </div>
  </div>
</div>
<div class="page" id="page-settings">
  <div class="topbar"><h1>⚙️ 设置</h1></div>
  <div class="page-placeholder">设置页面建设中…</div>
</div>

<!-- 对话抽屉 -->
<div class="mask" id="maskConv"></div>
<div class="drawer" id="drawer">
  <h2>💬 对话列表</h2>
  <div class="conv-list" id="convList"></div>
  <button class="btn-new-conv" id="btnNewConv">＋ 新建对话</button>
</div>

<!-- 右侧工具栏 -->
<div class="mask" id="maskTool"></div>
<div class="toolbar" id="toolbar">
  <div class="tb-header">
    <button class="tb-back" id="tbBack">←</button>
    <span class="tb-title" id="tbTitle">工具箱</span>
  </div>
  <div class="tb-page active" id="tool-grid">
    <div class="tb-grid">
      <div class="tb-cell" data-tool="search">
        <span class="tb-icon">🔍</span><span class="tb-label">搜索</span>
      </div>
      <div class="tb-cell" data-tool="emoji">
        <span class="tb-icon">😺</span><span class="tb-label">表情</span>
      </div>
      <div class="tb-cell" data-tool="backup">
        <span class="tb-icon">📦</span><span class="tb-label">备份</span>
      </div>
    </div>
  </div>
  <div class="tb-page" id="tool-search">
    <div class="tb-search-box">
      <input type="text" id="searchInput" placeholder="搜索聊天记录…">
    </div>
    <div class="tb-search-results" id="searchResults">
      <div class="tb-empty">输入关键词开始搜索</div>
    </div>
  </div>
  <div class="tb-page" id="tool-emoji">
    <div class="stk-mgr">
      <div class="stk-add-row">
        <input type="text" id="stkName" placeholder="名字（必填）">
        <input type="text" id="stkDesc" placeholder="描述（AI识别用）">
      </div>
      <div class="stk-add-row">
        <input type="text" id="stkUrl" placeholder="图床URL（粘贴链接）">
        <button class="bk-btn" id="btnStkFile">选图片</button>
        <input type="file" id="stkFileInput" accept="image/*" style="display:none">
      </div>
      <div class="stk-add-row">
        <select id="stkCat">
          <option value="卖萌撒娇">卖萌撒娇</option>
          <option value="抽象恶搞">抽象恶搞</option>
          <option value="其他">其他</option>
        </select>
        <button class="btn-save" id="btnStkAdd">＋ 添加</button>
      </div>
      <div class="stk-preview" id="stkPreview"></div>
      <div id="stkMgrList"></div>
    </div>
  </div>
  <div class="tb-page" id="tool-backup">
    <div class="bk-section">
      <h3 class="bk-title">📤 导出当前对话</h3>
      <div class="bk-btns">
        <button class="bk-btn" id="expTxt">导出 TXT（人读）</button>
        <button class="bk-btn" id="expJsonl">导出 JSONL（数据）</button>
      </div>
    </div>
    <div class="bk-section">
      <h3 class="bk-title">📤 全量备份</h3>
      <div class="bk-hint">导出所有对话 + 渠道配置，可用于恢复或搬家</div>
      <div class="bk-btns">
        <button class="bk-btn" id="expFull">导出完整备份</button>
      </div>
    </div>
    <div class="bk-section">
      <h3 class="bk-title">📥 导入</h3>
      <div class="bk-hint">支持 JSONL（单对话）或完整备份（JSON）</div>
      <div class="bk-btns">
        <button class="bk-btn" id="impJsonl">导入 JSONL 到当前对话</button>
        <button class="bk-btn" id="impFull">恢复完整备份</button>
      </div>
      <input type="file" id="impFile" accept=".jsonl,.json,.txt" style="display:none">
    </div>
  </div>
</div>

<!-- 设置面板 -->
<div class="mask" id="mask"></div>
<div class="panel" id="panel">
  <div class="tabs">
    <button data-tab="conv" class="active">💬 本对话</button>
    <button data-tab="channel">🔌 渠道</button>
    <button data-tab="general">📦 通用</button>
  </div>

  <div class="tab-page active" id="tab-conv">
    <div class="field">
      <label>对话名称</label>
      <input type="text" id="setConvName" placeholder="对话名称">
    </div>
    <div class="field">
      <label>成员（1~3个，轮流模式按此顺序发言）</label>
      <div id="memberList"></div>
      <div class="add-member-row">
        <select id="addMemberChannel"></select>
        <input type="text" id="addMemberModel" list="modelList" placeholder="模型名">
        <datalist id="modelList"></datalist>
        <button id="btnAddMember">＋</button>
      </div>
      <div class="hint">先选渠道再填模型（渠道拉取过列表可下拉选）。成员名字可直接点击修改</div>
    </div>
    <div class="field">
      <label>回复模式</label>
      <div class="seg">
        <button id="modeRound">🔁 轮流回复</button>
        <button id="modePick">👆 点名回复</button>
      </div>
      <div class="hint">轮流：发消息后全员按顺序各回一轮｜点名：发完点下方成员气泡谁答。两种模式下点成员条都可手动让TA发言</div>
    </div>
    <div class="field">
      <label>系统提示词（本对话专属）</label>
      <textarea id="setSystem" placeholder="可留空"></textarea>
    </div>
    <div class="field">
      <label>上下文条数</label>
      <div class="slider-row">
        <input type="range" id="setCtx" min="0" max="200" step="2" value="20">
        <span class="val" id="ctxVal">20</span>
      </div>
    </div>
    <div class="field">
      <label>温度 Temperature</label>
      <div class="slider-row">
        <input type="range" id="setTemp" min="0" max="2" step="0.1" value="0.8">
        <span class="val" id="tempVal">0.8</span>
      </div>
    </div>
    <div class="panel-btns">
      <button class="btn-danger" id="btnDelConv">删除此对话</button>
      <button class="btn-save" id="btnSaveConv">保存</button>
    </div>
  </div>

  <div class="tab-page" id="tab-channel">
    <div id="channelList"></div>
    <button class="btn-new-conv" id="btnNewChannel" style="width:100%;">＋ 新增渠道</button>
    <div class="panel-btns">
      <button class="btn-save" id="btnSaveChannels">保存全部渠道</button>
    </div>
  </div>

  <div class="tab-page" id="tab-general">
    <div class="field">
      <label>存储占用</label>
      <div class="storage-box" id="storageBox">读取中…</div>
    </div>
    <div class="panel-btns">
      <button class="btn-clear" id="btnPersist">🔒 申请持久化保护</button>
      <button class="btn-clear" id="btnClearChat">清空当前对话消息</button>
    </div>
  </div>
</div>

<div class="bottom-tabs">
  <button data-page="roles"><span class="tab-icon">🎭</span>角色</button>
  <button data-page="rp"><span class="tab-icon">💬</span>聊天</button>
  <button class="active" data-page="chat"><span class="tab-icon">🏠</span>讨论室</button>
  <button data-page="persona"><span class="tab-icon">👤</span>人设</button>
  <button data-page="settings"><span class="tab-icon">⚙️</span>设置</button>
</div>

<div class="toast" id="toast"></div>

<script src="markdown.js"></script>
<script src="app.js"></script>
<script src="ui.js"></script>
</body>
</html>
