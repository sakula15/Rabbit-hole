<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Rabbit hole</title>
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#faf7f4">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --bg:#faf7f4; --card:#ffffff; --line:#eee4dc;
  --me:#ffd9e8; --me-text:#6b3a52;
  --ai:#ffffff; --ai-text:#4a3a35;
  --accent:#e8849e; --sub:#a8968c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
  display:flex;flex-direction:column;
  max-width:560px;margin:0 auto;
}

/* ══ 顶栏 ══ */
.topbar{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:8px 8px;background:var(--card);border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:20;
}
.topbar h1{
  font-size:14px;color:#5a4038;font-weight:600;flex:1;text-align:center;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px;
}
.topbar .ctx-badge{font-size:10px;color:var(--sub);margin-left:6px;font-weight:400;}
.icon-btn{border:none;background:none;font-size:18px;padding:8px;cursor:pointer;min-width:40px;min-height:40px;}

/* ══ 消息区 ══ */
.chat{flex:1;overflow-y:auto;padding:16px 12px 8px;}
.msg-wrap{display:flex;flex-direction:column;margin-bottom:4px;animation:fadeIn .25s ease;}
.msg-wrap.user{align-items:flex-end;}
.msg-wrap.ai{align-items:flex-start;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.model-tag{
  font-size:9.5px;color:var(--sub);margin:0 4px 3px;
  display:flex;align-items:center;gap:4px;
}
.model-tag::before{content:'✦';font-size:8px;color:#dbb8c8;}
.msg{display:flex;width:100%;}
.msg.user{justify-content:flex-end;}
.bubble{
  max-width:82%;padding:10px 14px;border-radius:16px;
  font-size:13px;line-height:1.75;white-space:pre-wrap;word-break:break-word;
  position:relative;cursor:pointer;
}
.msg.user .bubble{background:var(--me);color:var(--me-text);border-radius:16px 16px 4px 16px;}
.msg.ai .bubble{background:var(--ai);color:var(--ai-text);border:1px solid var(--line);border-radius:16px 16px 16px 4px;box-shadow:0 1px 4px rgba(0,0,0,.03);}
.bubble pre.md-pre{background:#f8f0f4;border:1px solid #eee4dc;border-radius:8px;padding:8px 10px;margin:4px 0;overflow-x:auto;font-size:11.5px;line-height:1.6;}
.bubble pre.md-pre code{font-family:'Courier New',Consolas,monospace;color:#5a4038;background:none;padding:0;}
.bubble code.md-code{background:#f5ece6;border-radius:4px;padding:1px 5px;font-size:12px;font-family:'Courier New',Consolas,monospace;color:#a06478;}
.bubble a.md-link{color:var(--accent);text-decoration:underline;word-break:break-all;}
.bubble ul.md-ul,.bubble ol.md-ol{margin:4px 0 4px 18px;padding:0;}
.bubble li{margin:2px 0;}
.bubble blockquote.md-bq{border-left:3px solid #e8c4d2;margin:4px 0;padding:2px 10px;color:#8a6a5c;}
.bubble table.md-tbl{border-collapse:collapse;margin:6px 0;font-size:12px;width:100%;overflow-x:auto;display:block;}
.bubble .md-tbl th,.bubble .md-tbl td{border:1px solid #eee4dc;padding:4px 8px;text-align:left;}
.bubble .md-tbl th{background:#f8f0f4;color:#5a4038;font-weight:600;}
.bubble .md-tbl td{background:var(--card);}
.bubble img.att{max-width:160px;max-height:160px;border-radius:10px;display:block;margin:4px 0;}
.bubble .filechip{
  display:inline-flex;align-items:center;gap:4px;background:rgba(0,0,0,.05);
  border-radius:8px;padding:3px 8px;font-size:11px;margin:2px 0;
}
.actions{display:none;gap:6px;margin:6px 4px 2px;flex-wrap:wrap;}
.msg-wrap.show-actions .actions{display:flex;}
.actions button{
  border:1px solid var(--line);background:var(--card);border-radius:14px;
  font-size:11px;color:#8a6a5c;padding:6px 14px;cursor:pointer;min-height:30px;
}
.actions button.warn{color:#c46a6a;}
.edit-box{width:82%;display:flex;flex-direction:column;gap:8px;}
.edit-box textarea{
  width:100%;border:1.5px solid var(--accent);border-radius:12px;padding:10px 12px;
  font-size:13px;line-height:1.7;font-family:inherit;background:var(--card);
  resize:vertical;min-height:80px;outline:none;
}
.edit-btns{display:flex;gap:8px;justify-content:flex-end;}
.edit-btns button{border:none;border-radius:12px;padding:8px 18px;font-size:12px;cursor:pointer;min-height:34px;}
.edit-save{background:var(--accent);color:#fff;}
.edit-cancel{background:#f0e6e0;color:#8a6a5c;}
details.think{
  margin:0 0 6px;max-width:82%;
  border:1px dashed #ddc9d4;border-radius:10px;background:#fdf6f9;overflow:hidden;
}
details.think summary{
  list-style:none;cursor:pointer;padding:6px 12px;
  font-size:10.5px;color:#b888a0;display:flex;align-items:center;gap:5px;
}
details.think summary::-webkit-details-marker{display:none;}
details.think summary::before{content:'▸';transition:transform .2s;}
details.think[open] summary::before{transform:rotate(90deg);}
details.think .tbody{
  padding:4px 12px 10px;font-size:11px;line-height:1.7;color:#9a7a8a;
  white-space:pre-wrap;word-break:break-word;border-top:1px dashed #eedde6;
}
.meta-line{
  font-size:9.5px;color:var(--sub);margin:4px 4px 12px;
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
}
.cut-line{
  text-align:center;font-size:10px;color:var(--sub);margin:10px 0;
  display:flex;align-items:center;gap:8px;
}
.cut-line::before,.cut-line::after{content:'';flex:1;height:1px;background:var(--line);}

/* ══ 成员条（点名/展示） ══ */
.member-bar{
  flex-shrink:0;display:flex;gap:8px;padding:8px 12px 0;background:var(--card);
  overflow-x:auto;border-top:1px solid var(--line);
}
.member-bar:empty{display:none;padding:0;border:none;}
.chip{
  flex-shrink:0;display:inline-flex;align-items:center;gap:5px;
  border:1px solid var(--line);background:var(--bg);border-radius:16px;
  padding:6px 13px;font-size:11px;color:#7a5a64;cursor:pointer;min-height:32px;
}
.chip .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}
.chip.busy{opacity:.5;}
.chip-hint{flex-shrink:0;font-size:10px;color:var(--sub);align-self:center;padding:6px 0;}

/* ══ 附件/输入区 ══ */
.attach-bar{
  display:none;gap:8px;padding:8px 12px 0;background:var(--card);flex-wrap:wrap;
}
.attach-bar.has{display:flex;}
.att-chip{position:relative;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--bg);}
.att-chip img{width:52px;height:52px;object-fit:cover;display:block;}
.att-chip .fname{
  display:flex;align-items:center;height:52px;padding:0 10px;font-size:10px;color:#7a6358;max-width:120px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.att-chip .rm{
  position:absolute;top:0;right:0;width:18px;height:18px;border:none;
  background:rgba(0,0,0,.4);color:#fff;font-size:10px;border-radius:0 0 0 8px;cursor:pointer;
}
.inputbar{
  flex-shrink:0;display:flex;gap:6px;padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  background:var(--card);
}
.attach-btn{
  flex-shrink:0;border:none;background:none;font-size:19px;cursor:pointer;
  width:40px;height:42px;align-self:flex-end;color:#b89a8c;
}
.inputbar textarea{
  flex:1;border:1px solid var(--line);border-radius:20px;padding:10px 14px;
  font-size:13px;resize:none;max-height:110px;background:var(--bg);
  font-family:inherit;line-height:1.5;outline:none;
}
.send-btn{
  flex-shrink:0;border:none;border-radius:50%;width:42px;height:42px;
  background:var(--accent);color:#fff;font-size:16px;cursor:pointer;align-self:flex-end;
}
.send-btn.stop{background:#b08585;}

/* ══ 对话抽屉 ══ */
.mask{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:30;display:none;}
.mask.open{display:block;}
.drawer{
  position:fixed;top:0;bottom:0;left:0;z-index:31;width:78%;max-width:320px;
  background:var(--card);transform:translateX(-105%);transition:transform .28s ease;
  display:flex;flex-direction:column;padding:18px 14px calc(18px + env(safe-area-inset-bottom));
}
.drawer.open{transform:none;}
.drawer h2{font-size:14px;color:#5a4038;margin-bottom:14px;}
.conv-list{flex:1;overflow-y:auto;}
.conv-item{
  display:flex;align-items:center;gap:8px;padding:12px 10px;border-radius:12px;
  margin-bottom:6px;cursor:pointer;border:1px solid transparent;
}
.conv-item.active{background:#fdf0f4;border-color:#f0d4de;}
.conv-item .cinfo{flex:1;min-width:0;}
.conv-item .cname{font-size:13px;color:#5a4038;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.conv-item .cmeta{font-size:9.5px;color:var(--sub);margin-top:2px;}
.conv-item .cdel{
  border:none;background:none;color:#c9a8a8;font-size:14px;padding:6px;cursor:pointer;flex-shrink:0;
}
.btn-new-conv{
  border:1.5px dashed #e8c4d2;background:none;border-radius:12px;padding:12px;
  font-size:13px;color:var(--accent);cursor:pointer;margin-top:8px;
}

/* ══ 设置面板 + tabs ══ */
.panel{
  position:fixed;left:0;right:0;bottom:0;z-index:31;max-width:560px;margin:0 auto;
  background:var(--card);border-radius:20px 20px 0 0;
  padding:14px 18px calc(24px + env(safe-area-inset-bottom));
  transform:translateY(105%);transition:transform .28s ease;
  max-height:88vh;overflow-y:auto;
}
.panel.open{transform:none;}
.tabs{
  display:flex;gap:6px;margin-bottom:16px;position:sticky;top:-14px;
  background:var(--card);padding:10px 0 8px;z-index:2;
}
.tabs button{
  flex:1;border:none;border-radius:14px;padding:9px;font-size:12px;cursor:pointer;
  background:#f5ece6;color:#8a6a5c;
}
.tabs button.active{background:var(--accent);color:#fff;}
.tab-page{display:none;}
.tab-page.active{display:block;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;color:var(--sub);margin-bottom:5px;}
.field input[type=text],.field input[type=password],.field textarea,.field select{
  width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;
  font-size:12px;background:var(--bg);outline:none;font-family:inherit;
}
.field textarea{resize:vertical;min-height:60px;line-height:1.6;}
.slider-row{display:flex;align-items:center;gap:10px;}
.slider-row input[type=range]{flex:1;accent-color:var(--accent);}
.slider-row .val{font-size:13px;color:var(--accent);font-weight:600;min-width:36px;text-align:right;}
.hint{font-size:10px;color:var(--sub);margin-top:4px;line-height:1.6;}
.seg{display:flex;gap:8px;}
.seg button{
  flex:1;border:1px solid var(--line);background:var(--bg);border-radius:10px;
  padding:10px;font-size:12px;color:#8a6a5c;cursor:pointer;
}
.seg button.on{background:#fdf0f4;border-color:var(--accent);color:var(--accent);font-weight:600;}

/* 成员编辑列表 */
.member-item{
  display:flex;align-items:center;gap:6px;border:1px solid var(--line);
  border-radius:10px;padding:8px 10px;margin-bottom:8px;background:var(--bg);
}
.member-item .mname{
  flex:1;min-width:0;border:none;background:none;font-size:12px;color:#5a4038;
  outline:none;font-family:inherit;
}
.member-item .mmodel{
  font-size:9.5px;color:var(--sub);max-width:38%;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;
}
.member-item button{
  border:none;background:#f0e0e6;border-radius:8px;width:28px;height:28px;
  font-size:12px;color:#a06478;cursor:pointer;flex-shrink:0;
}
.add-member-row{display:flex;gap:6px;margin-bottom:6px;}
.add-member-row select{flex:1;min-width:0;}
.add-member-row input{flex:1.2;min-width:0;}
.add-member-row button{
  flex-shrink:0;border:none;border-radius:10px;padding:0 14px;font-size:12px;
  background:var(--accent);color:#fff;cursor:pointer;
}

/* 渠道卡片 */
.channel-card{
  border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;
  background:var(--bg);
}
.channel-card .field{margin-bottom:10px;}
.channel-card .field input{background:var(--card);}
.ch-btns{display:flex;gap:8px;}
.ch-btns button{
  flex:1;border:none;border-radius:10px;padding:9px;font-size:11.5px;cursor:pointer;
  background:#f0e0e6;color:#a06478;
}
.ch-btns button.warn{background:#f5e4e0;color:#c46a6a;}
.ch-status{font-size:10px;color:var(--sub);margin-top:6px;min-height:14px;}

.panel-btns{display:flex;gap:10px;margin-top:18px;}
.panel-btns button{flex:1;border:none;border-radius:12px;padding:12px;font-size:13px;cursor:pointer;}
.btn-save{background:var(--accent);color:#fff;}
.btn-clear{background:#f0e6e0;color:#8a6a5c;}
.btn-danger{background:#f5e4e0;color:#c46a6a;}
.storage-box{
  border:1px solid var(--line);border-radius:12px;padding:12px 14px;
  font-size:11.5px;color:#7a6358;line-height:1.8;background:var(--bg);
}
.toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  background:rgba(60,40,40,.85);color:#fff;font-size:12px;
  padding:8px 18px;border-radius:18px;z-index:99;display:none;max-width:80%;text-align:center;
}
</style>
</head>
<body>

<div class="topbar">
  <button class="icon-btn" id="btnConvs">☰</button>
  <h1 id="convTitle">对话<span class="ctx-badge" id="ctxBadge"></span></h1>
  <button class="icon-btn" id="btnSettings">⚙️</button>
</div>

<div class="chat" id="chat"></div>

<div class="member-bar" id="memberBar"></div>
<div class="attach-bar" id="attachBar"></div>

<div class="inputbar">
  <button class="attach-btn" id="btnAttach">📎</button>
  <input type="file" id="fileInput" multiple accept="*/*" style="display:none">
  <textarea id="input" rows="1" placeholder="说点什么…"></textarea>
  <button class="send-btn" id="btnSend">➤</button>
</div>

<!-- 对话抽屉 -->
<div class="mask" id="maskConv"></div>
<div class="drawer" id="drawer">
  <h2>💬 对话列表</h2>
  <div class="conv-list" id="convList"></div>
  <button class="btn-new-conv" id="btnNewConv">＋ 新建对话</button>
</div>

<!-- 设置面板 -->
<div class="mask" id="mask"></div>
<div class="panel" id="panel">
  <div class="tabs">
    <button data-tab="conv" class="active">💬 本对话</button>
    <button data-tab="channel">🔌 渠道</button>
    <button data-tab="general">📦 通用</button>
  </div>

  <!-- Tab: 本对话 -->
  <div class="tab-page active" id="tab-conv">
    <div class="field">
      <label>对话名称</label>
      <input type="text" id="setConvName" placeholder="对话名称">
    </div>
    <div class="field">
      <label>成员（1~3个，轮流模式按此顺序发言）</label>
      <div id="memberList"></div>
      <div class="add-member-row">
        <select id="addMemberChannel"></select>
        <input type="text" id="addMemberModel" list="modelList" placeholder="模型名">
        <datalist id="modelList"></datalist>
        <button id="btnAddMember">＋</button>
      </div>
      <div class="hint">先选渠道再填模型（渠道拉取过列表可下拉选）。成员名字可直接点击修改</div>
    </div>
    <div class="field">
      <label>回复模式</label>
      <div class="seg">
        <button id="modeRound">🔁 轮流回复</button>
        <button id="modePick">👆 点名回复</button>
      </div>
      <div class="hint">轮流：发消息后全员按顺序各回一轮｜点名：发完点下方成员气泡谁答。两种模式下点成员条都可手动让TA发言</div>
    </div>
    <div class="field">
      <label>系统提示词（本对话专属）</label>
      <textarea id="setSystem" placeholder="可留空"></textarea>
    </div>
    <div class="field">
      <label>上下文条数</label>
      <div class="slider-row">
        <input type="range" id="setCtx" min="0" max="200" step="2" value="20">
        <span class="val" id="ctxVal">20</span>
      </div>
    </div>
    <div class="field">
      <label>温度 Temperature</label>
      <div class="slider-row">
        <input type="range" id="setTemp" min="0" max="2" step="0.1" value="0.8">
        <span class="val" id="tempVal">0.8</span>
      </div>
    </div>
    <div class="panel-btns">
      <button class="btn-danger" id="btnDelConv">删除此对话</button>
      <button class="btn-save" id="btnSaveConv">保存</button>
    </div>
  </div>

  <!-- Tab: 渠道 -->
  <div class="tab-page" id="tab-channel">
    <div id="channelList"></div>
    <button class="btn-new-conv" id="btnNewChannel" style="width:100%;">＋ 新增渠道</button>
    <div class="panel-btns">
      <button class="btn-save" id="btnSaveChannels">保存全部渠道</button>
    </div>
  </div>

  <!-- Tab: 通用 -->
  <div class="tab-page" id="tab-general">
    <div class="field">
      <label>存储占用</label>
      <div class="storage-box" id="storageBox">读取中…</div>
    </div>
    <div class="panel-btns">
      <button class="btn-clear" id="btnPersist">🔒 申请持久化保护</button>
      <button class="btn-clear" id="btnClearChat">清空当前对话消息</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}

/* ══════════ IndexedDB 层 ══════════ */
let db=null;
function openDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open('minichat',1);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv');
      if(!d.objectStoreNames.contains('msgs'))d.createObjectStore('msgs');
    };
    req.onsuccess=e=>{db=e.target.result;resolve();};
    req.onerror=e=>reject(e.target.error);
  });
}
function kvGet(key){
  return new Promise((res,rej)=>{
    const r=db.transaction('kv').objectStore('kv').get(key);
    r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);
  });
}
function kvSet(key,val){
  return new Promise((res,rej)=>{
    const r=db.transaction('kv','readwrite').objectStore('kv').put(val,key);
    r.onsuccess=()=>res();r.onerror=()=>rej(r.error);
  });
}
function msgsGet(convId){
  return new Promise((res,rej)=>{
    const r=db.transaction('msgs').objectStore('msgs').get(convId);
    r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);
  });
}
function msgsSet(convId,arr){
  return new Promise((res,rej)=>{
    const r=db.transaction('msgs','readwrite').objectStore('msgs').put(arr,convId);
    r.onsuccess=()=>res();r.onerror=()=>rej(r.error);
  });
}
function msgsDel(convId){
  return new Promise((res,rej)=>{
    const r=db.transaction('msgs','readwrite').objectStore('msgs').delete(convId);
    r.onsuccess=()=>res();r.onerror=()=>rej(r.error);
  });
}

/* ══════════ 全局状态 ══════════ */
let channels=[];
let convs=[];
let activeId=null;
let msgs=[];
let pendingAtt=[];
let streaming=false, aborter=null, stopChain=false;
let editIdx=null;
let draftMembers=null;

const $=id=>document.getElementById(id);
const chatEl=$('chat'), inputEl=$('input'), sendBtn=$('btnSend');
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

let toastTimer=null;
function toast(t){
  const el=$('toast');el.textContent=t;el.style.display='block';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.style.display='none',2400);
}
function getConv(){return convs.find(c=>c.id===activeId);}
function getChannel(id){return channels.find(c=>c.id===id);}
function saveMeta(){return Promise.all([kvSet('channels',channels),kvSet('convs',convs),kvSet('activeId',activeId)]);}
function saveMsgs(){return msgsSet(activeId,msgs).catch(()=>toast('保存失败，存储可能已满'));}

/* ══════════ 初始化 + 旧数据迁移 ══════════ */
async function init(){
  await openDB();
  if(navigator.storage&&navigator.storage.persist){navigator.storage.persist().catch(()=>{});}
  channels=await kvGet('channels')||[];
  convs=await kvGet('convs')||[];
  activeId=await kvGet('activeId')||null;

  if(!convs.length){
    let oldCfg=null,oldMsgs=null;
    try{oldCfg=JSON.parse(localStorage.getItem('minichat_cfg')||'null');}catch(e){}
    try{oldMsgs=JSON.parse(localStorage.getItem('minichat_msgs')||'null');}catch(e){}
    let ch=null;
    if(oldCfg&&oldCfg.url){
      ch={id:uid(),name:'渠道1',url:oldCfg.url,key:oldCfg.key||'',models:oldCfg.models||[]};
      channels.push(ch);
    }
    const conv={
      id:uid(),name:'对话1',
      system:oldCfg&&oldCfg.system||'',
      ctx:oldCfg?(oldCfg.ctx??20):20,
      temp:oldCfg?(oldCfg.temp??0.8):0.8,
      mode:'round',
      members:(ch&&oldCfg.model)?[{id:uid(),channelId:ch.id,model:oldCfg.model,name:oldCfg.model}]:[],
      updatedAt:Date.now()
    };
    convs.push(conv);activeId=conv.id;
    if(oldMsgs&&oldMsgs.length){
      const now=Date.now();
      oldMsgs.forEach(m=>{
        if(!m.ts)m.ts=now;
        if(m.role==='assistant'&&!m.name)m.name=m.model||'AI';
        if(m.role==='assistant'&&conv.members.length&&!m.memberId)m.memberId=conv.members[0].id;
      });
      await msgsSet(conv.id,oldMsgs);
    }
    await saveMeta();
    if(oldMsgs||oldCfg)toast('已迁移旧记录到「对话1」✓');
  }
  if(!activeId||!getConv())activeId=convs[0].id;
  msgs=await msgsGet(activeId);
  render();renderMemberBar();updateTitle();
}

/* ══════════ 工具 ══════════ */
function estTokens(str){
  if(!str)return 0;
  let cjk=0,other=0;
  for(const ch of str){if(/[\u4e00-\u9fff\u3040-\u30ff]/.test(ch))cjk++;else other++;}
  return Math.round(cjk+other/3.8);
}
function fmtTime(ts){
  if(!ts)return'';
  const d=new Date(ts),n=new Date();
  const hm=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  return (d.toDateString()===n.toDateString())?hm:(d.getMonth()+1)+'/'+d.getDate()+' '+hm;
}
function renderMd(raw){
  if(!raw)return '';
  var safe=[],ph=function(html){safe.push(html);return '\x01'+(safe.length-1)+'\x01';};
  var t=raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/```(\w*)\n?([\s\S]*?)```/g,function(_,l,c){return ph('<pre class="md-pre"><code>'+c.trimEnd()+'</code></pre>');});
  t=t.replace(/`([^`\n]+)`/g,function(_,c){return ph('<code class="md-code">'+c+'</code>');});
  t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g,'<em>$1</em>');
  t=t.replace(/~~(.+?)~~/g,'<s>$1</s>');
  t=t.replace(/(^|\n)#{3} (.+)/g,'$1<strong style="font-size:13px">$2</strong>');
  t=t.replace(/(^|\n)#{2} (.+)/g,'$1<strong style="font-size:14px">$2</strong>');
  t=t.replace(/(^|\n)# (.+)/g,'$1<strong style="font-size:15px">$2</strong>');
  t=t.replace(/(^|\n)&gt; (.+)/g,'$1<blockquote class="md-bq">$2</blockquote>');
  t=t.replace(/(^|\n)[*\-] (.+)/g,'$1<li>$2</li>');
  t=t.replace(/((?:<li>.*<\/li>\n?)+)/g,'<ul class="md-ul">$1</ul>');
  t=t.replace(/(^|\n)(\d+)\. (.+)/g,'$1<li>$2. $3</li>');
  t=t.replace(/((?:(?:^|\n)\|.+\|[ ]*)+)/g,function(_,block){
    var rows=block.trim().split('\n').filter(function(r){return r.trim();});
    if(rows.length<2)return block;
    var html='<table class="md-tbl">';
    rows.forEach(function(row,ri){
      if(ri===1&&/^\|[\s\-:|]+\|$/.test(row.trim()))return;
      var tag=ri===0?'th':'td';
      var cells=row.replace(/^\||\|$/g,'').split('|');
      html+='<tr>';
      cells.forEach(function(c){html+='<'+tag+'>'+c.trim()+'</'+tag+'>';});
      html+='</tr>';
    });
    html+='</table>';
    return ph(html);
  });;
  t=t.replace(/https?:\/\/[^\s<\x01]+/g,function(u){return ph('<a class="md-link" href="'+u+'" target="_blank" rel="noopener">'+u+'</a >');});
  t=t.replace(/\x01(\d+)\x01/g,function(_,i){return safe[i];});
  return t;
}
function extractThink(m){
  if(!m.content)return;
  const match=m.content.match(/<think>([\s\S]*?)<\/think>/);
  if(match){
    m.reasoning=(m.reasoning||'')+match[1].trim();
    m.content=m.content.replace(/<think>[\s\S]*?<\/think>/,'').trim();
  }
}

/* ══════════ 渲染 ══════════ */
function updateTitle(){
  const c=getConv();
  $('convTitle').childNodes[0].textContent=c?c.name:'对话';
  $('ctxBadge').textContent=c?(' · 上下文'+c.ctx):'';
}
function render(){
  const c=getConv();if(!c)return;
  chatEl.innerHTML='';
  const cutIndex=c.ctx>0?Math.max(0,msgs.length-c.ctx):msgs.length;
  msgs.forEach((m,i)=>{
    if(i===cutIndex&&i>0){
      const cut=document.createElement('div');
      cut.className='cut-line';
      cut.textContent='⬇ 上下文起点（以下 '+(msgs.length-i)+' 条会被发送）';
      chatEl.appendChild(cut);
    }
    chatEl.appendChild(i===editIdx?buildEditNode(m,i):buildMsgNode(m,i));
  });
  chatEl.scrollTop=chatEl.scrollHeight;
}
function buildMsgNode(m,i){
  const wrap=document.createElement('div');
  wrap.className='msg-wrap '+(m.role==='user'?'user':'ai');
  if(m.role==='assistant'&&(m.name||m.model)){
    const tag=document.createElement('div');
    tag.className='model-tag';tag.textContent=m.name||m.model;
    wrap.appendChild(tag);
  }
  if(m.reasoning){
    const det=document.createElement('details');det.className='think';
    det.innerHTML='<summary>💭 思考过程 ('+m.reasoning.length+'字)</summary>';
    const body=document.createElement('div');body.className='tbody';body.textContent=m.reasoning;
    det.appendChild(body);wrap.appendChild(det);
  }
  const row=document.createElement('div');
  row.className='msg '+(m.role==='user'?'user':'ai');
  const b=document.createElement('div');b.className='bubble';
  (m.images||[]).forEach(src=>{const img=document.createElement('img');img.className='att';img.src=src;b.appendChild(img);});
  (m.files||[]).forEach(f=>{
    const chip=document.createElement('span');chip.className='filechip';chip.textContent='📄 '+f.name;
    b.appendChild(chip);b.appendChild(document.createElement('br'));
  });
  const txt=document.createElement('span');txt.className='txt';txt.innerHTML=renderMd(m.content||'');
  b.appendChild(txt);
  b.onclick=()=>{if(streaming)return;wrap.classList.toggle('show-actions');};
  row.appendChild(b);wrap.appendChild(row);

  const act=document.createElement('div');act.className='actions';
  const bc=document.createElement('button');bc.textContent='📋 复制';
  bc.onclick=()=>{
    const t=m.content||'';
    if(navigator.clipboard){navigator.clipboard.writeText(t).then(()=>toast('已复制 ✓')).catch(()=>toast('复制失败'));}
    else{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('已复制 ✓');}
  };
  act.appendChild(bc);
  const be=document.createElement('button');be.textContent='✏️ 编辑';
  be.onclick=()=>{if(streaming)return;editIdx=i;render();};
  act.appendChild(be);
  if(m.role==='assistant'){
    const br=document.createElement('button');br.textContent='🔄 重说';
    br.onclick=()=>{if(streaming)return;regen(i);};
    act.appendChild(br);
  }
  const bk=document.createElement('button');bk.textContent='↩️ 回溯';
  bk.onclick=async()=>{
    if(streaming)return;
    const after=msgs.length-i-1;
    if(after<=0){toast('后面没有消息了');return;}
    if(!confirm('删除这条之后的 '+after+' 条消息？'))return;
    msgs.splice(i+1);await saveMsgs();render();toast('已回溯 ✓');
  };
  act.appendChild(bk);
  const bd=document.createElement('button');bd.className='warn';bd.textContent='🗑 删除';
  bd.onclick=async()=>{if(streaming)return;msgs.splice(i,1);await saveMsgs();render();};
  act.appendChild(bd);
  wrap.appendChild(act);

  const meta=document.createElement('div');meta.className='meta-line';
  let parts=[fmtTime(m.ts)];
  if(m.role==='assistant'&&m.meta){
    const pre=m.meta.est?'~':'';
    parts.push('↑'+pre+(m.meta.inTok||0)+' tok','↓'+pre+(m.meta.outTok||0)+' tok',((m.meta.ms||0)/1000).toFixed(1)+'s');
  }
  meta.textContent=parts.filter(Boolean).join(' · ');
  wrap.appendChild(meta);
  return wrap;
}
function buildEditNode(m,i){
  const wrap=document.createElement('div');
  wrap.className='msg-wrap '+(m.role==='user'?'user':'ai');
  const box=document.createElement('div');box.className='edit-box';
  const ta=document.createElement('textarea');ta.value=m.content||'';
  const btns=document.createElement('div');btns.className='edit-btns';
  const cancel=document.createElement('button');cancel.className='edit-cancel';cancel.textContent='取消';
  cancel.onclick=()=>{editIdx=null;render();};
  const save=document.createElement('button');save.className='edit-save';save.textContent='保存';
  save.onclick=async()=>{m.content=ta.value;editIdx=null;await saveMsgs();render();toast('已保存 ✓');};
  btns.appendChild(cancel);btns.appendChild(save);
  if(m.role==='user'){
    const resend=document.createElement('button');resend.className='edit-save';resend.textContent='保存并重发';
    resend.onclick=async()=>{
      if(streaming)return;
      m.content=ta.value;m.ts=Date.now();editIdx=null;
      msgs.splice(i+1);
      await saveMsgs();render();
      const c=getConv();
      if(c.mode==='round'){
        for(const mem of c.members){
          if(stopChain)break;
          const idx=pushAiMsg(mem);
          await saveMsgs();render();
          await runGeneration(idx,mem);
        }
        stopChain=false;
      }
    };
    btns.appendChild(resend);
  }
  box.appendChild(ta);box.appendChild(btns);wrap.appendChild(box);
  setTimeout(()=>{ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);},50);
  return wrap;
}
function updateMsgDom(i){
  const wraps=chatEl.querySelectorAll('.msg-wrap');
  const wrap=wraps[i];if(!wrap)return;
  const m=msgs[i];
  let det=wrap.querySelector('details.think');
  if(m.reasoning&&!det){
    det=document.createElement('details');det.className='think';det.open=true;
    det.innerHTML='<summary>💭 思考中…</summary><div class="tbody"></div>';
    wrap.insertBefore(det,wrap.querySelector('.msg'));
  }
  if(det&&m.reasoning){
    det.querySelector('.tbody').textContent=m.reasoning;
    det.querySelector('summary').textContent=m.content?'💭 思考过程 ('+m.reasoning.length+'字)':'💭 思考中…';
    if(m.content)det.open=false;
  }
  const txt=wrap.querySelector('.bubble .txt');
  if(txt)txt.textContent=m.content;
  chatEl.scrollTop=chatEl.scrollHeight;
}

/* ══════════ 成员条 ══════════ */
function renderMemberBar(){
  const c=getConv();const bar=$('memberBar');bar.innerHTML='';
  if(!c||!c.members.length)return;
  c.members.forEach(mem=>{
    const chip=document.createElement('div');
    chip.className='chip'+(streaming?' busy':'');
    chip.innerHTML='<span class="dot"></span>';
    chip.appendChild(document.createTextNode(mem.name||mem.model));
    chip.onclick=()=>{if(streaming)return;manualSpeak(mem);};
    bar.appendChild(chip);
  });
  const hint=document.createElement('span');
  hint.className='chip-hint';
  hint.textContent=c.mode==='pick'?'👆点名模式':'🔁轮流模式';
  bar.appendChild(hint);
}

/* ══════════ 消息构建 ══════════ */
function toApiMsg(m,selfId){
  let text=m.content||'';
  (m.files||[]).forEach(f=>{text+='\n\n【附件文件: '+f.name+'】\n'+f.text;});
  if(m.role==='assistant'){
    if(m.memberId===selfId)return{role:'assistant',content:text};
    return{role:'user',content:'['+(m.name||m.model||'其他AI')+']: '+text};
  }
  if(m.images&&m.images.length){
    const parts=[];
    if(text)parts.push({type:'text',text});
    m.images.forEach(src=>parts.push({type:'image_url',image_url:{url:src}}));
    return{role:'user',content:parts};
  }
  return{role:'user',content:text};
}
function buildPayloadUpTo(i,mem){
  const c=getConv();const out=[];
  let sys=c.system?c.system.trim():'';
  if(c.members.length>1){
    const names=c.members.map(x=>x.name||x.model).join('、');
    sys+=(sys?'\n\n':'')+'你是「'+(mem.name||mem.model)+'」，正在参与一个多人对话，成员有：'+names+'。其他成员的发言会以 [名字]: 开头标注。请以自己的身份自然参与对话，不要在回复开头加自己的名字标签。';
  }
  if(sys)out.push({role:'system',content:sys});
  const hist=msgs.slice(0,i);
  const slice=c.ctx>0?hist.slice(-c.ctx):hist.slice(-1);
  slice.forEach(m=>out.push(toApiMsg(m,mem.id)));
  return out;
}

/* ══════════ 生成核心 ══════════ */
async function runGeneration(i,mem){
  const c=getConv();
  const ch=getChannel(mem.channelId);
  const aiMsg=msgs[i];
  if(!ch||!ch.url||!ch.key){
    aiMsg.content='❌ 成员「'+(mem.name||mem.model)+'」的渠道配置缺失或已被删除，请到设置里重新添加该成员';
    await saveMsgs();render();return;
  }
  streaming=true;stopChainCheck();
  sendBtn.textContent='■';sendBtn.classList.add('stop');
  renderMemberBar();
  const t0=Date.now();let usage=null;
  const payload=buildPayloadUpTo(i,mem);

  // 进入时的内容快照（重试时恢复，避免内容重复叠加）
  const baseContent=aiMsg.content||'', baseReasoning=aiMsg.reasoning||'';
  const maxAttempts=2;
  let attempt=0, lastErr=null, aborted=false;

  while(attempt<maxAttempts){
    attempt++;
    aiMsg.content=baseContent;
    aiMsg.reasoning=baseReasoning;
    lastErr=null;
    aborter=new AbortController();
    try{
      const res=await fetch(ch.url.replace(/\/+$/,'')+'/chat/completions',{
        method:'POST',signal:aborter.signal,
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+ch.key},
        body:JSON.stringify({model:mem.model,messages:payload,temperature:c.temp,stream:true,stream_options:{include_usage:true}})
      });
      if(!res.ok){
        const errText=await res.text().catch(()=>'');
        throw new Error('HTTP '+res.status+' '+errText.slice(0,200));
      }
      const reader=res.body.getReader();const decoder=new TextDecoder();let buf='';
      while(true){
        const{done,value}=await reader.read();
        if(done)break;
        buf+=decoder.decode(value,{stream:true});
        const lines=buf.split('\n');buf=lines.pop();
        for(const line of lines){
          const t=line.trim();
          if(!t.startsWith('data:'))continue;
          const data=t.slice(5).trim();
          if(data==='[DONE]')continue;
          try{
            const j=JSON.parse(data);
            if(j.usage)usage=j.usage;
            const d=j.choices&&j.choices[0]&&j.choices[0].delta;
            if(d){
              const rc=d.reasoning_content||d.reasoning;
              if(rc)aiMsg.reasoning=(aiMsg.reasoning||'')+rc;
              if(d.content)aiMsg.content+=d.content;
              updateMsgDom(i);
            }
          }catch(e){}
        }
      }
      break; // 成功，跳出重试循环
    }catch(e){
      if(e.name==='AbortError'){
        aiMsg.content+='\n[已手动停止]';
        stopChain=true;aborted=true;
        break;
      }
            lastErr=e;
      try{
        window.__xwDebug=window.__xwDebug||[];
        window.__xwDebug.push('['+new Date().toLocaleTimeString()+'] 第'+attempt+'次 '+(Date.now()-t0)+'ms后断 | '+(e.name||'?')+': '+(e.message||e)+' | 已收正文'+(aiMsg.content||'').length+'字/思维链'+(aiMsg.reasoning||'').length+'字');
      }catch(_){}
      if(attempt<maxAttempts){
        aiMsg.content=baseContent+'⚠ 连接中断，正在自动重试…';
        updateMsgDom(i);
        await new Promise(r=>setTimeout(r,800));
      }
    }
  }

  if(lastErr&&!aborted){
    const partial=aiMsg.content&&aiMsg.content!==baseContent+'⚠ 连接中断，正在自动重试…'?aiMsg.content:baseContent;
    const errInfo='['+(lastErr.name||'Error')+'] '+(lastErr.message||lastErr);
    aiMsg.content=(partial&&partial.trim()?partial+'\n\n':'')
      +'❌ ['+(mem.name||mem.model)+' @ '+ch.name+'] 已重试'+(maxAttempts-1)+'次仍失败：'+errInfo
      +'\n（可点"重说"再试）';
    toast('请求失败');
  }

  extractThink(aiMsg);
  if(!aiMsg.content&&!aiMsg.reasoning)aiMsg.content='(空回复)';

  const ms=Date.now()-t0;
  if(usage){aiMsg.meta={inTok:usage.prompt_tokens||0,outTok:usage.completion_tokens||0,ms,est:false};}
  else{
    let inChars=0;
    payload.forEach(p=>{
      if(typeof p.content==='string')inChars+=p.content.length;
      else(p.content||[]).forEach(x=>{if(x.type==='text')inChars+=x.text.length;});
    });
    aiMsg.meta={inTok:Math.round(inChars/2),outTok:estTokens((aiMsg.content||'')+(aiMsg.reasoning||'')),ms,est:true};
  }
  if(!aiMsg.reasoning)delete aiMsg.reasoning;
  streaming=false;aborter=null;
  sendBtn.textContent='➤';sendBtn.classList.remove('stop');
  await saveMsgs();render();renderMemberBar();
}
function stopChainCheck(){stopChain=false;}
function pushAiMsg(mem){
  msgs.push({role:'assistant',content:'',reasoning:'',model:mem.model,name:mem.name||mem.model,memberId:mem.id,ts:Date.now(),meta:null});
  return msgs.length-1;
}
async function manualSpeak(mem){
  const i=pushAiMsg(mem);
  await saveMsgs();render();
  await runGeneration(i,mem);
}
async function regen(i){
  if(streaming)return;
  const m=msgs[i];const c=getConv();
  let mem=c.members.find(x=>x.id===m.memberId)||c.members[0];
  if(!mem){toast('本对话没有成员，先去设置添加');return;}
  m.content='';m.reasoning='';m.meta=null;m.model=mem.model;m.name=mem.name||mem.model;m.memberId=mem.id;m.ts=Date.now();
  await saveMsgs();render();
  await runGeneration(i,mem);
}

/* ══════════ 发送 ══════════ */
async function send(){
  if(streaming){if(aborter)aborter.abort();return;}
  const c=getConv();
  const text=inputEl.value.trim();
  if(!text&&!pendingAtt.length)return;
  if(!c.members.length){toast('请先在设置「本对话」里添加成员');openPanel();return;}
  const userMsg={role:'user',content:text,images:[],files:[],ts:Date.now()};
  pendingAtt.forEach(a=>{
    if(a.type==='image')userMsg.images.push(a.data);
    else userMsg.files.push({name:a.name,text:a.text});
  });
  pendingAtt=[];renderAttach();
  msgs.push(userMsg);
  inputEl.value='';autoGrow();
  await saveMsgs();render();
  c.updatedAt=Date.now();await saveMeta();
  if(c.mode==='round'){
    for(const mem of c.members){
      if(stopChain)break;
      const i=pushAiMsg(mem);
      await saveMsgs();render();
      await runGeneration(i,mem);
    }
    stopChain=false;
  }
}

/* ══════════ 附件 ══════════ */
$('btnAttach').onclick=()=>$('fileInput').click();
$('fileInput').onchange=async e=>{
  for(const file of e.target.files){
    if(file.type.startsWith('image/')){
      if(file.size>4*1024*1024){toast(file.name+' 超过4MB，跳过');continue;}
      const data=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(file);});
      pendingAtt.push({type:'image',name:file.name,data});
    }else{
      if(file.size>1024*1024){toast(file.name+' 超过1MB，跳过');continue;}
      const t=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsText(file);});
      pendingAtt.push({type:'file',name:file.name,text:t});
    }
  }
  e.target.value='';renderAttach();
};
function renderAttach(){
  const bar=$('attachBar');bar.innerHTML='';
  bar.classList.toggle('has',pendingAtt.length>0);
  pendingAtt.forEach((a,i)=>{
    const chip=document.createElement('div');chip.className='att-chip';
    if(a.type==='image'){const img=document.createElement('img');img.src=a.data;chip.appendChild(img);}
    else{const n=document.createElement('div');n.className='fname';n.textContent='📄 '+a.name;chip.appendChild(n);}
    const rm=document.createElement('button');rm.className='rm';rm.textContent='×';
    rm.onclick=()=>{pendingAtt.splice(i,1);renderAttach();};
    chip.appendChild(rm);bar.appendChild(chip);
  });
}

/* ══════════ 对话抽屉 ══════════ */
function renderConvList(){
  const list=$('convList');list.innerHTML='';
  convs.slice().sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0)).forEach(c=>{
    const item=document.createElement('div');
    item.className='conv-item'+(c.id===activeId?' active':'');
    const info=document.createElement('div');info.className='cinfo';
    info.innerHTML='<div class="cname"></div><div class="cmeta"></div>';
    info.querySelector('.cname').textContent=c.name;
    info.querySelector('.cmeta').textContent=c.members.map(m=>m.name||m.model).join('、')||'无成员';
    info.onclick=()=>switchConv(c.id);
    const del=document.createElement('button');del.className='cdel';del.textContent='🗑';
    del.onclick=async e=>{
      e.stopPropagation();
      if(!confirm('删除对话「'+c.name+'」及其全部消息？'))return;
      await msgsDel(c.id);
      convs=convs.filter(x=>x.id!==c.id);
      if(!convs.length){
        const nc={id:uid(),name:'对话1',system:'',ctx:20,temp:0.8,mode:'round',members:[],updatedAt:Date.now()};
        convs.push(nc);
      }
      if(activeId===c.id){activeId=convs[0].id;msgs=await msgsGet(activeId);}
      await saveMeta();renderConvList();render();renderMemberBar();updateTitle();
    };
    item.appendChild(info);item.appendChild(del);
    list.appendChild(item);
  });
}
async function switchConv(id){
  if(streaming){toast('生成中，请先停止');return;}
  activeId=id;msgs=await msgsGet(id);editIdx=null;
  await kvSet('activeId',id);
  closeDrawer();render();renderMemberBar();updateTitle();
}
$('btnNewConv').onclick=async()=>{
  const c={id:uid(),name:'对话'+(convs.length+1),system:'',ctx:20,temp:0.8,mode:'round',
    members:[],updatedAt:Date.now()};
  convs.push(c);await saveMeta();
  await switchConv(c.id);
  toast('已创建，请到设置 ⚙️ 添加成员');
};
function openDrawer(){renderConvList();$('drawer').classList.add('open');$('maskConv').classList.add('open');}
function closeDrawer(){$('drawer').classList.remove('open');$('maskConv').classList.remove('open');}
$('btnConvs').onclick=openDrawer;
$('maskConv').onclick=closeDrawer;

/* ══════════ 设置面板 ══════════ */
document.querySelectorAll('.tabs button').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-page').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    $('tab-'+btn.dataset.tab).classList.add('active');
    if(btn.dataset.tab==='general')updateStorageBox();
  };
});
function openPanel(){
  const c=getConv();
  $('setConvName').value=c.name;
  $('setSystem').value=c.system;
  $('setCtx').value=c.ctx;$('ctxVal').textContent=c.ctx;
  $('setTemp').value=c.temp;$('tempVal').textContent=c.temp;
  draftMembers=c.members.map(m=>({...m}));
  setModeBtns(c.mode);
  renderMemberEditor();renderChannelSelect();renderChannelList();
  $('panel').classList.add('open');$('mask').classList.add('open');
}
function closePanel(){$('panel').classList.remove('open');$('mask').classList.remove('open');}
$('btnSettings').onclick=openPanel;
$('mask').onclick=closePanel;
$('setCtx').oninput=e=>$('ctxVal').textContent=e.target.value;
$('setTemp').oninput=e=>$('tempVal').textContent=e.target.value;
let draftMode='round';
function setModeBtns(mode){
  draftMode=mode;
  $('modeRound').classList.toggle('on',mode==='round');
  $('modePick').classList.toggle('on',mode==='pick');
}
$('modeRound').onclick=()=>setModeBtns('round');
$('modePick').onclick=()=>setModeBtns('pick');

function renderMemberEditor(){
  const box=$('memberList');box.innerHTML='';
  draftMembers.forEach((m,i)=>{
    const item=document.createElement('div');item.className='member-item';
    const name=document.createElement('input');name.className='mname';name.value=m.name||m.model;
    name.onchange=()=>{m.name=name.value.trim()||m.model;};
    const model=document.createElement('span');model.className='mmodel';
    const ch=getChannel(m.channelId);
    model.textContent=(ch?ch.name:'⚠渠道丢失')+'/'+m.model;
    const up=document.createElement('button');up.textContent='↑';
    up.onclick=()=>{if(i>0){[draftMembers[i-1],draftMembers[i]]=[draftMembers[i],draftMembers[i-1]];renderMemberEditor();}};
    const down=document.createElement('button');down.textContent='↓';
    down.onclick=()=>{if(i<draftMembers.length-1){[draftMembers[i+1],draftMembers[i]]=[draftMembers[i],draftMembers[i+1]];renderMemberEditor();}};
    const rm=document.createElement('button');rm.textContent='✕';
    rm.onclick=()=>{draftMembers.splice(i,1);renderMemberEditor();};
    item.appendChild(name);item.appendChild(model);item.appendChild(up);item.appendChild(down);item.appendChild(rm);
    box.appendChild(item);
  });
}
function renderChannelSelect(){
  const sel=$('addMemberChannel');sel.innerHTML='';
  channels.forEach(ch=>{
    const o=document.createElement('option');o.value=ch.id;o.textContent=ch.name;
    sel.appendChild(o);
  });
  sel.onchange=fillModelDatalist;
  fillModelDatalist();
}
function fillModelDatalist(){
  const ch=getChannel($('addMemberChannel').value);
  const dl=$('modelList');dl.innerHTML='';
  if(ch&&ch.models)ch.models.forEach(id=>{const o=document.createElement('option');o.value=id;dl.appendChild(o);});
}
$('btnAddMember').onclick=()=>{
  if(draftMembers.length>=3){toast('最多3个成员');return;}
  const chId=$('addMemberChannel').value;
  const model=$('addMemberModel').value.trim();
  if(!chId){toast('请先在「渠道」tab添加渠道');return;}
  if(!model){toast('请填模型名');return;}
  draftMembers.push({id:uid(),channelId:chId,model,name:model});
  $('addMemberModel').value='';
  renderMemberEditor();
};
$('btnSaveConv').onclick=async()=>{
  const c=getConv();
  c.name=$('setConvName').value.trim()||c.name;
  c.system=$('setSystem').value;
  c.ctx=parseInt($('setCtx').value)||0;
  c.temp=parseFloat($('setTemp').value)||0.8;
  c.mode=draftMode;
  c.members=draftMembers;
  c.updatedAt=Date.now();
  await saveMeta();
  closePanel();render();renderMemberBar();updateTitle();
  toast('已保存 ✓');
};
$('btnDelConv').onclick=async()=>{
  const c=getConv();
  if(!confirm('删除对话「'+c.name+'」及其全部消息？'))return;
  await msgsDel(c.id);
  convs=convs.filter(x=>x.id!==c.id);
  if(!convs.length)convs.push({id:uid(),name:'对话1',system:'',ctx:20,temp:0.8,mode:'round',members:[],updatedAt:Date.now()});
  activeId=convs[0].id;msgs=await msgsGet(activeId);
  await saveMeta();closePanel();render();renderMemberBar();updateTitle();
};

/* ══════════ 渠道管理 ══════════ */
function renderChannelList(){
  const box=$('channelList');box.innerHTML='';
  channels.forEach((ch,i)=>{
    const card=document.createElement('div');card.className='channel-card';
    card.innerHTML=
      '<div class="field"><label>渠道名称</label><input type="text" data-f="name"></div>'+
      '<div class="field"><label>API 地址</label><input type="text" data-f="url" placeholder="https://api.example.com/v1"></div>'+
      '<div class="field"><label>API Key</label><input type="password" data-f="key"></div>'+
      '<div class="ch-btns"><button data-a="fetch">🔄 拉取模型</button><button data-a="del" class="warn">删除渠道</button></div>'+
      '<div class="ch-status"></div>';
    card.querySelector('[data-f=name]').value=ch.name;
    card.querySelector('[data-f=url]').value=ch.url;
    card.querySelector('[data-f=key]').value=ch.key;
    card.querySelector('.ch-status').textContent=ch.models&&ch.models.length?('已缓存 '+ch.models.length+' 个模型'):'';
    card.querySelectorAll('[data-f]').forEach(inp=>{
      inp.onchange=()=>{ch[inp.dataset.f]=inp.value.trim();};
    });
    card.querySelector('[data-a=fetch]').onclick=async()=>{
      const st=card.querySelector('.ch-status');
      ch.name=card.querySelector('[data-f=name]').value.trim();
      ch.url=card.querySelector('[data-f=url]').value.trim();
      ch.key=card.querySelector('[data-f=key]').value.trim();
      if(!ch.url||!ch.key){st.textContent='❌ 先填地址和Key';return;}
      st.textContent='拉取中…';
      try{
        const res=await fetch(ch.url.replace(/\/+$/,'')+'/models',{headers:{'Authorization':'Bearer '+ch.key}});
        if(!res.ok)throw new Error('HTTP '+res.status);
        const j=await res.json();
        const ids=(j.data||[]).map(m=>m.id).filter(Boolean).sort();
        if(!ids.length)throw new Error('返回列表为空');
        ch.models=ids;await saveMeta();
        st.textContent='✓ 拉取到 '+ids.length+' 个模型';
        fillModelDatalist();
      }catch(e){st.textContent='❌ '+(e.message||e);}
    };
    card.querySelector('[data-a=del]').onclick=async()=>{
      const used=convs.some(c=>c.members.some(m=>m.channelId===ch.id));
      if(used&&!confirm('有对话的成员正在使用此渠道，删除后这些成员将无法发言。继续？'))return;
      channels.splice(i,1);await saveMeta();
      renderChannelList();renderChannelSelect();
    };
    box.appendChild(card);
  });
}
$('btnNewChannel').onclick=()=>{
  channels.push({id:uid(),name:'渠道'+(channels.length+1),url:'',key:'',models:[]});
  renderChannelList();renderChannelSelect();
};
$('btnSaveChannels').onclick=async()=>{
  await saveMeta();
  renderChannelSelect();
  toast('渠道已保存 ✓');
};

/* ══════════ 通用tab ══════════ */
async function updateStorageBox(){
  const box=$('storageBox');
  try{
    const est=await navigator.storage.estimate();
    const used=(est.usage/1024/1024).toFixed(1);
    const quota=(est.quota/1024/1024).toFixed(0);
    let persist='';
    if(navigator.storage.persisted)persist=(await navigator.storage.persisted())?'✓ 已申请持久化保护':'未持久化（可点下方按钮申请）';
    box.innerHTML='已用 '+used+' MB / 配额约 '+quota+' MB<br>'+persist+'<br>对话数：'+convs.length+' · 渠道数：'+channels.length+((window.__xwDebug&&window.__xwDebug.length)?('<br><br>📋 断流日志：<br>'+window.__xwDebug.join('<br>')):'');
  }catch(e){box.textContent='当前环境不支持存储查询';}
}
$('btnPersist').onclick=async()=>{
  const btn=$('btnPersist');
  btn.textContent='⏳ 申请中…';
  try{
    if(!navigator.storage||!navigator.storage.persist){
      toast('❌ 此浏览器不支持持久化API');
      btn.textContent='🔒 申请持久化保护';
      return;
    }
    const ok=await navigator.storage.persist();
    if(ok){
      toast('✓ 申请成功，数据已受保护');
    }else{
      toast('⚠ 浏览器拒绝了申请，但数据依然正常保存');
    }
    btn.textContent='🔒 申请持久化保护';
  }catch(e){
    toast('❌ 申请出错：'+(e.message||e));
    btn.textContent='🔒 申请持久化保护';
  }
};
$('btnClearChat').onclick=async()=>{
  if(!confirm('清空当前对话的所有消息？'))return;
  msgs=[];await saveMsgs();render();closePanel();toast('已清空');
};

inputEl.addEventListener('input',autoGrow);
sendBtn.onclick=send;

init().catch(e=>{
  document.body.insertAdjacentHTML('beforeend','<div style="padding:20px;color:#c00;font-size:13px;">初始化失败：'+(e.message||e)+'</div>');
